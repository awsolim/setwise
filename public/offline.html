<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1b2d" />
    <title>Setwise Offline</title>
    <style>
      :root {
        color: #121a29;
        background: #f3f6fa;
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 360px);
        border: 1px solid #d4dbe6;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 18px 42px rgb(15 27 45 / 12%);
        padding: 28px 22px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0;
      }

      p {
        margin: 12px 0 0;
        color: #667085;
        font-size: 15px;
        line-height: 1.6;
      }

      a {
        display: flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        margin-top: 22px;
        border-radius: 14px;
        background: #0f1b2d;
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Setwise is offline</h1>
      <p>
        Your saved plan and workout history live on this device. Reconnect and
        open Setwise again to refresh the app shell.
      </p>
      <a href="/today">Back to Today</a>
    </main>
  </body>
</html>
